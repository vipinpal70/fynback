name: Deploy Worker to Railway

on:
  push:
    branches:
      - master
    paths:
      - 'apps/worker/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

  workflow_dispatch:

jobs:
  deploy-worker:
    name: Deploy BullMQ Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service fynback-worker
